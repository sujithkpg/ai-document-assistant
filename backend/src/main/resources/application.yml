server:
  port: 8080

spring:
  application:
    name: rag-document-assistant-api
  datasource:
    url: jdbc:h2:mem:ragdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

  ai:
    model:
      chat: openai
      embedding: openai
    openai:
      api-key:
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small
app:
  cors:
    allowed-origin: http://localhost:4200
  ai:
    mode: openai